// Sectors
sector.serpulor-StarterSector.name = Начальная Точка
sector.serpulor-StarterSector.description = "Вы начинаете с этого места. Иследуйте [yellow]буры [white]и прочие вещи."

sector.serpulor-FrozenForest.name = Ледяной Лес
sector.serpulor-FrozenForest.description = "После захвата предыдущего сектора, вы высадились на этот. Исследуйте и сгенерируйте [yellow]электричество [white]и откройте новую [yellow]турель."

sector.serpulor-CraterRift.name = Разлом Кратеров
sector.serpulor-CraterRift.description = "Из-за большого количества врагов на секторе, которых отбили, враги решили увеличить их поток. Используйте [yellow]дуги[white], которые потребляют энергию. [grey]Также рекомендуется использование регенераторов."

sector.serpulor-BiomassSynthesisFacility.name = Центр Исследования Биомассы
sector.serpulor-BiomassSynthesisFacility.description = В последствии взрыва споры захватили бывший центр исследования, на вас движутся неизвестные враги, приготовтесь.

// Planets
planet.serpulor-alterra.name = Катосус
planet.serpulor-alterra.description = "Планета [blue]Катосус [white]это измененная кампания и механика [blue]Серпуло[white]. также присутствуют дополнительные сектора, измененная структура волн и сложность."

// Blocks
