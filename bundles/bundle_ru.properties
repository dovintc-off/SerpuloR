block.serpulor-alterra-conveyor.name = Конвейер
block.serpulor-alterra-conveyor.descrtption = Транспортирует ресурсы вперед.

block.serpulor-alterra-mechanical-drill.name = Mechanical Drill
block.serpulor-alterra-mechanical-drill.description = "When placed on ore, outputs items at a slow pace indefinitely. Only capable of mining basic resources." 

